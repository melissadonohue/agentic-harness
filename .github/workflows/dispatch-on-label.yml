name: Dispatch on Label

# Triggers when an issue is labeled 'ready-for-agent'.
# This is the automation entry point — label an issue, and the pipeline takes over.

on:
  issues:
    types: [labeled]

jobs:
  dispatch:
    name: Dispatch Agent
    runs-on: ubuntu-latest
    if: github.event.label.name == 'ready-for-agent'

    # Prevent concurrent dispatches for the same issue
    concurrency:
      group: dispatch-issue-${{ github.event.issue.number }}
      cancel-in-progress: false

    permissions:
      contents: write
      issues: write
      pull-requests: write

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: harness
          POSTGRES_PASSWORD: harness
          POSTGRES_DB: harness_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U harness -d harness_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run dispatch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATABASE_URL: postgresql://harness:harness@localhost:5432/harness_dev
          CI_BUDGET: 5
        run: |
          chmod +x scripts/dispatch.sh
          scripts/dispatch.sh ${{ github.event.issue.number }}

      - name: Post failure comment
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "## Dispatch Failed

          The dispatch workflow failed for issue #${{ github.event.issue.number }}.

          **Workflow run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Please check the workflow logs for details.

          ---
          _Posted by \`dispatch-on-label.yml\` workflow_"

          gh issue edit ${{ github.event.issue.number }} --add-label "escalated"
